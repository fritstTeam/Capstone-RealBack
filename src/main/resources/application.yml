spring:
  # MySQL 연동
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # local DB or Server DB (Container IP)
    url: jdbc:mysql://127.0.0.1:3306/capstone
    username: root
    password: 엄준식

  #jpa 설정
  jpa:
    hibernate:
      ddl-auto: update  # 또는 create
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  application:
    name: maple

springdoc:
  api-docs:
    path:
      /api/v1 # 요청에 붙여서 보낼 접두사 설정

  swagger-ui:
    path:  # API 명세서 접근 경로에 대한 별칭 swagger-ui/index.html로 리다이렉션 됨.
      /api

# 스웨거 요청 url 설정 환경변수 env에 따라서 어느곳으로 요청을 보낼건지 달라짐.
# SwaggerConfig Class 참조
swagger:
  env: local # 또는 develop
  local-url: http://localhost:8080/
  develop-url: https://modern-world.shop/
