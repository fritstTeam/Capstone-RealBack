services:
  back:
    image: capstone1234z/capstone:latest
    ports:
      - "80:8080"
    depends_on:
          - mysql
    volumes:
      - ./application.yml:/config/application.yml

  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: 엄준식

      MYSQL_DATABASE: cap
      MYSQL_USER: 엄준식
      MYSQL_PASSWORD: 엄준식

    ports:
      - "3306:3306"

    # 좌 로컬 / 우 container
    volumes:
      - ./mysql-data:/var/lib/mysql