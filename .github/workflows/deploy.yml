name: Deploy to EC2

on:
  push:
    branches:
      - develop  # main 브랜치에 push될 때 실행

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/capstone-secret:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/capstone-secret:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/capstone-secret:latest || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/capstone-secret:latest
            docker compose down
            docker compose -f /home/ubuntu/docker-compose.yml up
